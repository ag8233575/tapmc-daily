name: TAPMC Daily Reports (VEG only)
on:
  schedule:
    # 台北 07:20–07:58 = UTC 23:20–23:58（前一天），每 2 分鐘一班車
    - cron: "20-59/2 23 * * *"
    # 台北 08:00–08:04 = UTC 00:00–00:04（當天），每 2 分鐘一班車
    - cron: "0-4/2 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tapmc-daily-veg
  # 遇到重疊時排隊等候，不殺死正在執行的任務
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          pip install playwright pdf2image pillow
          playwright install --with-deps chromium

      # 修正：快取 Playwright 瀏覽器，避免每次重新下載（省 2–3 分鐘）
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Run script (veg only)
        run: python .github/scripts/run.py

      - name: Commit and push outputs (if changed)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # 修正：確保 docs 資料夾存在再 add
          mkdir -p docs
          git add docs/

          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update veg pages"

          # 修正：rebase 失敗時主動中止，避免 workflow 卡住
          git pull --rebase --autostash || (git rebase --abort && exit 1)
          git push
